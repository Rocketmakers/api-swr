name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
  issues: write
  id-token: write
jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.tool-versions'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: build
        run: pnpm run build
      - name: test
        run: pnpm run test
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: pnpm exec semantic-release
